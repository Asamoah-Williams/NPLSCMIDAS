langsmith:
  tracing: "true"
  project_name: "default"

server:
  host: "0.0.0.0"
  port: 5001
  secret_key: "replace-with-random-string"

chat:
  default_room: "global"
  max_history: 100
  bot_username: "Assistant"
  bot_delay_seconds: 0.4
  allowed_origins:
    - "http://127.0.0.1:5500"
    - "http://127.0.0.1:5001"
    - "http://192.168.10.204:5001"
#    - "http://127.0.0.1:5002"
    - "*"
  ping_timeout: 25
  ping_interval: 10
